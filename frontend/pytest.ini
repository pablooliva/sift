# pytest configuration for txtai frontend tests (SPEC-024)
# E2E and Functional Testing Infrastructure

[pytest]
# Test paths
testpaths = tests

# Default timeout (5 minutes) - individual tests can override
timeout = 300

# Markers for test categorization
markers =
    e2e: End-to-end tests requiring running services and real browser (deselect with '-m "not e2e"')
    functional: Functional tests using Streamlit AppTest (no browser required)
    slow: Slow tests (>60s) - exclude from quick runs with '-m "not slow"'
    external: Tests requiring external APIs (Firecrawl, Together AI) - may fail without API keys

# Playwright settings
addopts = --browser chromium

# Filter deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning:streamlit.*
    ignore::DeprecationWarning:playwright.*

# Asyncio mode for async fixtures
asyncio_mode = auto

# Minimum pytest version
minversion = 7.4.0
