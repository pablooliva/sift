name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff (critical errors only)
        # E9: syntax errors, F63: invalid star imports, F7: statement errors, F82: undefined names
        # Full linting will be enabled progressively as violations are resolved
        run: ruff check . --select E9,F63,F7,F82

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP server dependencies
        working-directory: mcp_server
        run: pip install -e ".[dev]"

      - name: Run MCP server unit tests
        working-directory: mcp_server
        run: pytest tests/ -v -m "not integration" --tb=short
        env:
          # Tests run without real services; integration tests are excluded
          TXTAI_API_URL: http://localhost:8300
          TOGETHERAI_API_KEY: test-key-not-used-in-unit-tests
