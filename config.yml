# txtai API Configuration

# Enable writable mode for the API
writable: true

# Enable MCP (Model Context Protocol) support
# Exposes /mcp endpoint for AI client integration
# Note: Uses HTTP transport - requires stdio bridge for Claude Code
mcp: true

# Embeddings index configuration with Qdrant backend
# Hybrid search enabled: combines semantic (dense) + keyword (sparse/BM25) search
# SPEC-019 Phase 3: Using Ollama nomic-embed-text (768-dim) via custom Vectors class
embeddings:
  path: ollama  # Placeholder - required for ANN creation, actual model loaded via method
  method: custom_actions.ollama_vectors.OllamaVectors
  content: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
  backend: qdrant_txtai.ann.qdrant.Qdrant
  keyword: true  # Enable BM25 sparse keyword indexing for hybrid search
  scoring:
    normalize: true  # Normalize scores to 0-1 range (aligns BM25 and semantic scores)
    terms: true  # CRITICAL: Enables sparse keyword search (required for hybrid search!)
  qdrant:
    host: qdrant
    port: 6333
    collection: txtai_embeddings

# Path configuration - base directory for index files (scoring data, config)
# Note: Document content is stored in PostgreSQL (see 'content' setting above)
path: /data/index

# Knowledge Graph Configuration
# CRITICAL: approximate must be false for relationship discovery
# Without this, new documents won't discover relationships to existing content
graph:
  approximate: false  # REQUIRED - ensures new documents connect to existing knowledge
  limit: 15          # Maximum connections per node
  minscore: 0.1      # Minimum similarity threshold (0.0-1.0)

# LLM integration via Together AI serverless API
#
# CURRENT USAGE: This LLM is ONLY used by the llm-summary workflow (line 99)
#   - Called during document upload to generate summaries
#   - See: api_client.py summarize_text_llm() -> POST /workflow {name: "llm-summary"}
#
# NOT USED BY:
#   - Frontend RAG "Ask" page (uses RAG_LLM_MODEL from .env, direct API calls)
#   - MCP server RAG (uses RAG_LLM_MODEL from .env, direct API calls)
#   - Brief explanations (uses RAG_LLM_MODEL from .env, direct API calls)
#
# MODELS DON'T NEED TO MATCH:
#   - This LLM: Optimized for summarization (fast, cheap, good at condensing)
#   - RAG_LLM_MODEL: Optimized for RAG (large context window, strong reasoning)
#
# RECOMMENDED MODELS FOR SUMMARIZATION (cost per 1M tokens):
#   - Llama 3.1 8B Instruct Turbo: $0.18 (good balance)
#   - Qwen2.5 7B Instruct Turbo: $0.30 (same family as RAG model)
#   - Current Qwen2.5-72B: $1.20 (overkill for summarization)
#
# See Together AI models: https://api.together.ai/models
# LLM Configuration
# SPEC-019: Hybrid approach - Together AI for RAG/summaries, Ollama for classification
# NOTE: txtai does NOT support multiple named LLM instances (tested 2025-12-09)
# Only ONE global 'llm:' configuration is supported
llm:
  path: together_ai/Qwen/Qwen2.5-7B-Instruct-Turbo
  api_base: https://api.together.xyz/v1
  method: litellm

# Audio/Video Transcription
# DEPRECATED - SPEC-019 Phase 4: Replaced with lazy-loading workflow to save ~3 GB idle VRAM
# Uses lazy-loaded Whisper via custom workflow action instead of static pipeline
# Rollback: Uncomment to restore static Whisper loading
#
# transcription:
#   path: openai/whisper-large-v3
#   gpu: true  # Enable GPU acceleration

# Text Extraction
# Handles document and media file text extraction
textractor:
  sentences: true

# Image Captioning Pipeline DEPRECATED (SPEC-019 Phase 2)
# Old BLIP-2 pipeline, replaced by Ollama vision model
# Kept commented for rollback capability
#
# caption:
#   path: Salesforce/blip2-opt-2.7b
#   gpu: true

# Image Hash Pipeline (SPEC-008)
# For duplicate image detection using perceptual hashing
imagehash:

# Workflows (SPEC-008, SPEC-012, SPEC-013)
# Define workflow pipelines for API access
#
# IMPORTANT: Workflows vs Pipelines
# - Workflows create API endpoints (e.g., POST /workflow/labels)
# - Pipelines are the underlying components that do the work
# - Workflows call pipelines with specific parameters
# - A pipeline must be configured below for each workflow action used
workflow:
  # Ollama-based image captioning workflow (SPEC-019 Phase 2)
  # Uses custom workflow action pattern to call Ollama llama3.2-vision:11b
  # Replaces BLIP-2 pipeline, saves ~5.5 GB constant VRAM
  # Custom action approach used because txtai does not support multiple named LLM instances
  # See: SDD/research/txtai-Multi-LLM-Support.md for architectural decision rationale
  ollama-caption:
    tasks:
      - action: custom_actions.ollama_captioner.caption
  # caption workflow DEPRECATED - SPEC-019 Phase 2
  # Old BLIP-2 workflow kept commented for rollback capability
  #
  # caption:
  #   tasks:
  #     - action: caption
  # LLM-based summarization (RESEARCH-018)
  # Uses Together AI LLM for higher quality summaries of technical content
  # Endpoint: POST /workflow with {"name": "llm-summary", "elements": ["text to summarize"]}
  # Benefits over BART: synthesizes instead of extracting, captures structure/steps
  # Trade-off: ~1-2s latency vs 0.2s for BART
  # IMPORTANT: defaultrole: user is required for instruction-tuned models
  llm-summary:
    tasks:
      - task: template
        template: |
          Summarize the following document in 2-3 concise sentences. Focus on:
          - The main topic or purpose
          - Key techniques, methods, or findings
          - Document structure (if step-by-step or comparative)

          Be specific and technical. Avoid generic phrases.

          IMPORTANT: Provide ONLY the summary itself. Do not include introductory phrases like "Here's a summary" or "This document discusses". Start directly with the content.

          Document:
          """
          {text}
          """

          Summary:
        action: llm
        args:
          defaultrole: user
  # Ollama-based classification workflow (SPEC-019 Phase 1)
  # Uses custom workflow action pattern to call Ollama llama3.2-vision:11b
  # Replaces BART-MNLI pipeline, saves ~1.4 GB constant VRAM
  # Custom action approach used because txtai does not support multiple named LLM instances
  # See: SDD/research/txtai-Multi-LLM-Support.md for architectural decision rationale
  ollama-labels:
    tasks:
      - action: custom_actions.ollama_classifier.classify
        args: [["reference", "analysis", "technical", "strategic", "meeting-notes", "actionable", "status", "tool"]]

  # Multi-label classification with confidence scores for all labels
  # Returns comprehensive classification suitable for document preview UI:
  # - Scores ALL default labels (not just the top match)
  # - Optionally suggests additional custom labels beyond the default set
  # - Used by Upload preview workflow to show full confidence distribution
  ollama-labels-with-scores:
    tasks:
      - action: custom_actions.ollama_classifier.classify_with_scores
        args: [["reference", "analysis", "technical", "strategic", "meeting-notes", "actionable", "status", "tool"], true]

  # labels workflow DEPRECATED - SPEC-019 Phase 1
  # Old BART-MNLI workflow kept commented for rollback capability
  #
  # labels:
  #   tasks:
  #     - action: labels
  #       args: [["reference", "analysis", "technical", "strategic", "meeting-notes", "actionable", "status"]]

  # Lazy-loading Whisper transcription workflow (SPEC-019 Phase 4)
  # Uses custom workflow action pattern to lazy-load Whisper model on-demand
  # Replaces static transcription pipeline, saves ~3 GB idle VRAM
  # Model loads on first transcription request, cached for session
  # Custom action approach provides full lifecycle control (load/cache/unload)
  # See: SDD/research/txtai-Multi-LLM-Support.md for architectural decision rationale
  lazy-transcribe:
    tasks:
      - action: custom_actions.whisper_transcriber.transcribe

  # RAG (Retrieval-Augmented Generation) - SPEC-013
  # Implemented in Python API client rather than txtai workflow
  # Uses txtai embeddings search + Together AI Qwen2.5-72B for generation
  # See: frontend/utils/api_client.py rag_query() method (lines 1121-1320)

# Optional: Enable additional components
# Uncomment and customize as needed

# Extractive QA
# Enables question-answering capabilities where you can ask questions and get specific answers extracted from your documents. It uses the DistilBERT model fine-tuned on the SQuAD dataset to find and extract relevant text passages that answer your question.
# Redundant when using a general use agent like Claude Code with this as a KB.
# extractor:
#   path: distilbert-base-cased-distilled-squad

# Summarization
# Adds text summarization functionality to automatically generate concise summaries of longer documents or text. Upgraded to full BART-Large for ~15-20% better quality and more coherent summaries.
# Due to poor results, this has been replaced by the llm-summary workflow.
# summary:
#   path: facebook/bart-large-cnn

# Translation
# Enables automatic language translation. This specific model (opus-mt-en-es) translates from English to Spanish. You can swap in other Helsinki-NLP models for different language pairs (e.g., en-fr, en-de, etc.).
# translation:
#   path: Helsinki-NLP/opus-mt-en-es

# Segmentation
# Controls how text is split before indexing. When sentences: true, documents are automatically split into individual sentences rather than larger chunks. This can improve search precision for sentence-level retrieval.
# segmentation:
#   sentences: true

# Labels Pipeline (DEPRECATED - SPEC-019 Phase 1)
# Classification now uses Ollama llama3.2-vision:11b via direct API calls (api_client.py:classify_text)
# This saves ~1.4 GB constant VRAM by removing BART-MNLI from GPU memory
# Old workflow still exists in config but is no longer called by frontend
#
# To fully remove: Delete lines 128-166 (labels workflow) and restart txtai container
# For now, keeping config commented for rollback capability
#
# labels:
#   path: facebook/bart-large-mnli
